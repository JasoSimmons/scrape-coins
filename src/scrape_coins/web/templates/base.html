<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}scrape-coins{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ctext y='14' font-size='14'%3E%F0%9F%AA%A6%3C/text%3E%3C/svg%3E" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <a href="/">
        <span class="logo-ds" aria-hidden="true"></span>
        <span class="logo-text">scrape-coins</span>
      </a>
      <span class="tag">pairs · SOL</span>
    </div>
    <nav class="run-form">
      <button type="button" data-job="discovery" title="Pull new tokens from DexScreener">discover</button>
      <button type="button" data-job="snapshot" title="Refresh prices/MC for all tracked tokens">snapshot</button>
      <button type="button" data-job="enrich" title="Pull holders/dev wallet via Helius">enrich</button>
      <button type="button" data-job="classify" title="Re-evaluate redeploy verdict + idea score">classify</button>
    </nav>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer>
    <span>last render <span class="mono">{{ now if now else '—' }}</span></span>
  </footer>

  <script>
    document.querySelectorAll('[data-job]').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        const job = e.target.dataset.job;
        e.target.disabled = true;
        const orig = e.target.textContent;
        e.target.textContent = `${job}…`;
        try {
          const r = await fetch(`/api/run/${job}`, { method: 'POST' });
          const data = await r.json();
          e.target.textContent = `${job} ✓`;
          console.log(job, data);
          setTimeout(() => location.reload(), 800);
        } catch (err) {
          e.target.textContent = `${job} ✗`;
          console.error(err);
        } finally {
          setTimeout(() => { e.target.textContent = orig; e.target.disabled = false; }, 1500);
        }
      });
    });
  </script>
</body>
</html>
