# All thresholds for the "redeploy candidate" pipeline.
# Edit freely — restart the scheduler (or just the next hourly tick) to apply.

discovery:
  # Where to pull candidate token addresses from each tick.
  sources:
    - dexscreener_token_profiles_latest      # newly profiled tokens
    - dexscreener_token_profiles_recent      # recently updated profiles
    - dexscreener_token_boosts_latest        # boosted (paying) tokens
    - dexscreener_token_boosts_top           # top boosted
    - dexscreener_search_terms               # see search_terms below
  # Free-text searches against DexScreener — useful to seed broad SOL coverage.
  search_terms: ["SOL", "pump", "bonk", "wif", "moon"]
  chain_id: solana

dashboard_filters:
  # Default "/" view: newest listings only — great for scouting fresh meme runners.
  enabled: true
  max_pair_age_hours: 48
  # Tokens discovered before we grabbed pair_created_at still show via discovered_at fallback.
  use_discovered_at_if_no_pair_created: true

# Dashboard sort: "team_first" — what to run with your team first (composite score).
team_first_sort:
  weights:
    idea_score: 0.42           # narrative + organic traction proxy
    peak_mc: 0.18              # bigger peaks = more proven concept
    peak_holders: 0.14         # more holders at peak = wider resonance
    holder_distribution: 0.12  # lower top10 concentration at peak = less insider-y
    drawdown: 0.10            # deeper wipeouts = more upside if you execute
    social_links: 0.04        # presence of website/x/tg on profile
  peak_mc_log_min: 5.48
  peak_mc_log_max: 6.70
  holders_log_min: 2.00
  holders_log_max: 4.20

snapshot:
  # DexScreener allows up to 30 token addresses per /tokens/v1 call.
  batch_size: 30
  # Skip tokens we've already snapshotted this hour.
  min_minutes_between_snapshots: 50
  # Stop tracking tokens with no on-chain activity for N days (saves quota).
  prune_after_days_inactive: 21

enrichment:
  # Helius DAS getTokenAccounts page size when counting holders.
  holders_page_size: 1000
  # Cap holder counting at this number of pages (so a 100k-holder coin doesn't burn quota).
  holders_max_pages: 50
  # Re-enrich a token's holder/concentration data at most this often.
  refresh_minutes: 360
  # Dev wallet inactivity threshold (days) — used by classifier.
  dev_inactive_days: 7

# "Good idea, bad team" filter — coins that had real organic interest then got abandoned.
classifier:
  peak_mc_min_usd: 300_000
  peak_mc_max_usd: 5_000_000

  # Signs of organic traction at peak (must-haves):
  peak_holders_min: 300
  peak_top10_concentration_max: 0.35     # excluding LP / burn / known CEX
  peak_swaps_24h_min: 500
  hours_above_50pct_peak_min: 24
  require_lp_burned_or_locked: true

  # Signs the team gave up (must-haves now):
  current_drawdown_from_ath_min: 0.90    # 0.90 = down at least 90%
  current_volume_24h_max_usd: 2_000
  hours_since_ath_min: 24
  dev_wallet_inactive_days_min: 7

  # Hard excludes
  exclude_dev_dumped_pct_within_1h_of_peak: 0.50  # if dev dumped >=50% within 1h of peak, drop
  exclude_peak_holders_below: 100                  # bot pump
  exclude_peak_top10_above: 0.50                   # insider job

# Composite "idea score" — sortable in dashboard. All weights 0–1, normalized at display.
idea_score:
  weights:
    peak_holders: 0.20          # log10(holders) normalized
    holder_diversity: 0.15      # 1 - top10_concentration_at_peak
    volume_intensity: 0.15      # log10(peak_24h_vol / peak_mc) normalized
    sustain: 0.15               # hours_above_50pct_peak / 168, capped at 1
    holder_retention: 0.15      # holders_now / peak_holders, capped at 1
    time_to_peak: 0.10          # faster peak = more viral, capped at 24h
    social_presence: 0.05       # 0/0.33/0.66/1 for website/twitter/telegram
    ticker_quality: 0.05        # short clean ticker scores higher
  # Normalization bounds (used by scoring.py).
  peak_holders_log_min: 2.5     # log10(316)
  peak_holders_log_max: 4.5     # log10(31623)
  volume_intensity_log_min: -2  # vol/mc = 0.01
  volume_intensity_log_max: 1   # vol/mc = 10x

scheduler:
  discovery_minutes: 60
  snapshot_minutes: 60
  enrichment_minutes: 60
  classify_minutes: 60

http:
  request_timeout_seconds: 20
  max_retries: 4
  retry_backoff_seconds: 1.5
  # DexScreener public limits: 60 req/min for most endpoints, 300 req/min for /tokens.
  dexscreener_rps: 4
  helius_rps: 10
